<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namlatic — Weekly Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#1e2a3a; --orange:#f97316; --blue:#3b82f6;
  --green:#10b981; --yellow:#f59e0b; --rose:#f43f5e;
  --purple:#8b5cf6; --slate:#64748b;
  --light:#f1f5f9; --border:#e2e8f0;
  --text:#1e293b; --muted:#64748b; --white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--light);color:var(--text);}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--navy) 0%,#0f1117 100%);padding:28px 40px;}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:16px;}
.logo-box{width:52px;height:52px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:#fff;flex-shrink:0;}
.header h1{font-size:22px;font-weight:800;color:#fff;}
.header p{font-size:12px;color:#94a3b8;margin-top:3px;}

/* ── META BAR ── */
.meta-bar{max-width:960px;margin:-18px auto 0;background:#fff;border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);padding:16px 24px;
  display:flex;flex-wrap:wrap;gap:16px;position:relative;z-index:2;}
.meta-item{display:flex;flex-direction:column;gap:4px;}
.meta-item label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.meta-item input{font-size:13px;font-weight:600;color:var(--text);border:none;border-bottom:1.5px solid var(--border);
  background:transparent;padding:2px 0;outline:none;width:180px;}
.meta-item input:focus{border-bottom-color:var(--orange);}

/* ── TOOLBAR ── */
.toolbar{max-width:960px;margin:20px auto 0;padding:0 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.toolbar-label{font-size:12px;color:var(--muted);margin-right:4px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;
  border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn-orange{background:var(--orange);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-rose{background:var(--rose);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-slate{background:#e2e8f0;color:var(--slate);}
.btn-navy{background:var(--navy);color:#fff;}

/* ── MAIN LAYOUT ── */
.main{max-width:960px;margin:24px auto 60px;padding:0 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.full-col{grid-column:1/-1;}

/* ── CARD ── */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.card-title{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;}
.card-title span{font-size:16px;}
.card-body{padding:16px 18px;}

/* ── SUMMARY ── */
.summary-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;
  font-size:13px;font-family:inherit;resize:vertical;min-height:72px;outline:none;color:var(--text);}
.summary-input:focus{border-color:var(--orange);}

/* ── HIGHLIGHTS ── */
.highlight-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.highlight-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0;margin-top:6px;}
.highlight-input{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;
  font-size:13px;font-family:inherit;outline:none;resize:none;min-height:36px;color:var(--text);}
.highlight-input:focus{border-color:var(--orange);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--rose);font-size:16px;padding:4px;flex-shrink:0;}
.add-btn{display:flex;align-items:center;gap:6px;background:none;border:1.5px dashed var(--border);
  border-radius:8px;padding:8px 12px;color:var(--muted);font-size:13px;cursor:pointer;width:100%;margin-top:4px;}
.add-btn:hover{border-color:var(--orange);color:var(--orange);}

/* ── TASKS ── */
.task-item{border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;position:relative;}
.task-item.done{border-color:#10b98133;background:#10b98108;}
.task-item.in-progress{border-color:#f59e0b33;background:#f59e0b08;}
.task-item.blocked{border-color:#f43f5e33;background:#f43f5e08;}
.task-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
.task-status-sel{border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;
  font-size:12px;font-weight:600;outline:none;cursor:pointer;background:#fff;}
.task-textarea{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;
  font-size:13px;font-family:inherit;resize:vertical;min-height:48px;outline:none;color:var(--text);}
.task-textarea:focus{border-color:var(--blue);}
.task-dates{display:flex;gap:10px;flex-wrap:wrap;}
.date-field{display:flex;flex-direction:column;gap:3px;}
.date-field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.date-field input{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;outline:none;}
.date-field input:focus{border-color:var(--blue);}
.task-del{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--rose);font-size:16px;}

/* ── STATUS BADGE ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.badge-done{background:#10b98122;color:var(--green);}
.badge-progress{background:#f59e0b22;color:var(--yellow);}
.badge-blocked{background:#f43f5e22;color:var(--rose);}
.badge-planned{background:#3b82f622;color:var(--blue);}

/* ──  / NEXT STEPS ── */
.list-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.list-icon{font-size:14px;flex-shrink:0;margin-top:2px;}
.list-input{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;
  font-size:13px;font-family:inherit;outline:none;resize:none;color:var(--text);}
.list-input:focus{border-color:var(--purple);}

/* ── REPORT PREVIEW (for export) ── */
#report-preview{display:none;}

/* ── PRINT ── */
@media print{
  .toolbar,.meta-item input,.add-btn,.del-btn,.task-del,.btn,.no-print{display:none!important;}
  body{background:#fff;}
}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;
  padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-inner">
    <div class="logo-box">N</div>
    <div>
      <h1>Namlatic — Weekly Status Report</h1>
      <p>Internal Report &middot; Submitted to MD every Monday &amp; Friday at 11:00 AM</p>
    </div>
  </div>
</div>

<!-- ── META ── -->
<div class="meta-bar">
  <div class="meta-item">
    <label>Report Date</label>
    <input id="meta-date" type="text" placeholder="e.g. 30 June 2026">
  </div>
  <div class="meta-item">
    <label>Day</label>
    <input id="meta-day" type="text" placeholder="Monday / Friday">
  </div>
  <div class="meta-item">
    <label>Sprint #</label>
    <input id="meta-sprint" type="text" placeholder="e.g. Sprint 4">
  </div>
  <div class="meta-item">
    <label>Prepared By</label>
    <input id="meta-by" type="text" placeholder="Prasanth - Product Manager">
  </div>
  <div class="meta-item">
    <label>Submitted To</label>
    <input id="meta-to" type="text" placeholder="Mourali - Managing Director">
  </div>
</div>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <span class="toolbar-label">Export:</span>
  <button class="btn btn-rose" onclick="downloadPDF()">⬇ PDF</button>
  <button class="btn btn-green" onclick="downloadExcel()">⬇ Excel</button>
  <button class="btn btn-blue" onclick="window.print()">🖨 Print</button>
  <div style="flex:1"></div>
  <button class="btn btn-slate" onclick="saveToLocal()">💾 Save Draft</button>
  <button class="btn btn-navy" onclick="loadFromLocal()">📂 Load Draft</button>
  <button class="btn btn-orange" onclick="clearAll()">🗑 Clear All</button>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- Summary -->
  <div class="card full-col">
    <div class="card-header">
      <div class="card-title"><span>📝</span> Executive Summary</div>
    </div>
    <div class="card-body">
      <textarea class="summary-input" id="summary" placeholder="Write a 2–3 line summary of the week's progress, key wins, and overall sprint health..."></textarea>
    </div>
  </div>

  <!-- Highlights -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>🌟</span> Highlights</div>
      <button class="btn btn-orange" style="padding:5px 12px;font-size:12px;" onclick="addHighlight()">+ Add</button>
    </div>
    <div class="card-body" id="highlights-list"></div>
  </div>

  <!-- Tasks -->
  <div class="card full-col">
    <div class="card-header">
      <div class="card-title"><span>📋</span> Task Status</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-green" style="padding:5px 12px;font-size:12px;" onclick="addTask('completed')">+ Done</button>
        <button class="btn btn-orange" style="padding:5px 12px;font-size:12px;" onclick="addTask('in-progress')">+ In Progress</button>
        <button class="btn btn-rose" style="padding:5px 12px;font-size:12px;" onclick="addTask('blocked')">+ Blocked</button>
        <button class="btn btn-blue" style="padding:5px 12px;font-size:12px;" onclick="addTask('planned')">+ Planned</button>
      </div>
    </div>
    <div class="card-body" id="tasks-list"></div>
  </div>

  <!-- Blockers -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>⚠️</span> Blockers</div>
      <button class="btn btn-rose" style="padding:5px 12px;font-size:12px;" onclick="addListItem('blockers-list','⛔')">+ Add</button>
    </div>
    <div class="card-body" id="blockers-list"></div>
  </div>

  <!-- Next Steps -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>➡️</span> Next Steps</div>
      <button class="btn btn-blue" style="padding:5px 12px;font-size:12px;" onclick="addListItem('next-list','→')">+ Add</button>
    </div>
    <div class="card-body" id="next-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── DEFAULTS ──────────────────────────────────────────────────────────────
const DEFAULT = {
  meta: {
    date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
    day: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()],
    sprint: 'Sprint 1',
    by: 'Prasanth - Product Manager',
    to: 'Mourali - Managing Director'
  },
  summary: '',
  highlights: [
    'Successfully aligned core engineering priorities for the Air France live ticketing integration.',
    'Enforced a mandatory requirement-freezing protocol across the BA team to eliminate scope creep.',
    'Optimized resource tracking metrics for backend modules to enhance delivery speed.'
  ],
  tasks: [
    {status:'completed', text:'Currency Conversion engine development finalized at 80% and transitioned to final code review hooks.', start:'2026-06-15', end:'2026-06-26'},
    {status:'in-progress', text:'Sindhu actively collaborating with Amadeus technical teams on quick-response debugging for the Flight Order Management API.', start:'2026-06-18', end:''},
    {status:'blocked', text:'DZD Voucher email template modifications require a direct signed-off design confirmation before production deployment.', start:'2026-06-22', end:''}
  ],
  blockers: ['None at the moment'],
  nextSteps: ['Continue Namla Wallet development', 'Finalise SEO Phase 1 page list', 'Review Cursor AI team feedback']
};

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── META ──────────────────────────────────────────────────────────────────
function loadMeta(m) {
  document.getElementById('meta-date').value = m.date || '';
  document.getElementById('meta-day').value  = m.day  || '';
  document.getElementById('meta-sprint').value = m.sprint || '';
  document.getElementById('meta-by').value   = m.by   || '';
  document.getElementById('meta-to').value   = m.to   || '';
}
function getMeta() {
  return {
    date:   document.getElementById('meta-date').value,
    day:    document.getElementById('meta-day').value,
    sprint: document.getElementById('meta-sprint').value,
    by:     document.getElementById('meta-by').value,
    to:     document.getElementById('meta-to').value
  };
}

// ── HIGHLIGHTS ────────────────────────────────────────────────────────────
function addHighlight(text='') {
  const list = document.getElementById('highlights-list');
  const div = document.createElement('div');
  div.className = 'highlight-item';
  div.innerHTML = `
    <div class="highlight-dot"></div>
    <textarea class="highlight-input" placeholder="Enter a highlight...">${text}</textarea>
    <button class="del-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  list.appendChild(div);
}
function getHighlights() {
  return [...document.querySelectorAll('#highlights-list .highlight-input')].map(i=>i.value).filter(Boolean);
}

// ── TASKS ─────────────────────────────────────────────────────────────────
const STATUS_LABELS = {
  'completed':'✅ Done','in-progress':'🔄 In Progress','blocked':'🚫 Blocked','planned':'📅 Planned'
};
function addTask(status='in-progress', text='', start='', end='') {
  const list = document.getElementById('tasks-list');
  const div = document.createElement('div');
  div.className = `task-item ${status}`;
  div.innerHTML = `
    <button class="task-del" onclick="this.parentElement.remove()">✕</button>
    <div class="task-row">
      <select class="task-status-sel" onchange="updateTaskClass(this)">
        ${Object.entries(STATUS_LABELS).map(([v,l])=>`<option value="${v}"${v===status?' selected':''}>${l}</option>`).join('')}
      </select>
      <textarea class="task-textarea" placeholder="Describe the task...">${text}</textarea>
    </div>
    <div class="task-dates">
      <div class="date-field"><label>Start Date</label><input type="date" value="${start}"></div>
      <div class="date-field"><label>End Date / ETA</label><input type="text" placeholder="YYYY-MM-DD or TBD / On Hold" value="${end}"></div>
    </div>
  `;
  list.appendChild(div);
}
function updateTaskClass(sel) {
  const item = sel.closest('.task-item');
  item.className = 'task-item ' + sel.value;
}
function getTasks() {
  return [...document.querySelectorAll('#tasks-list .task-item')].map(el=>({
    status: el.querySelector('.task-status-sel').value,
    text:   el.querySelector('.task-textarea').value,
    start:  el.querySelectorAll('input')[0].value,
    end:    el.querySelectorAll('input')[1].value
  }));
}

// ── GENERIC LIST (blockers / next steps) ──────────────────────────────────
function addListItem(containerId, icon, text='') {
  const list = document.getElementById(containerId);
  const div = document.createElement('div');
  div.className = 'list-item';
  div.innerHTML = `
    <span class="list-icon">${icon}</span>
    <textarea class="list-input" placeholder="Add item...">${text}</textarea>
    <button class="del-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  list.appendChild(div);
}
function getList(id) {
  return [...document.querySelectorAll(`#${id} .list-input`)].map(i=>i.value).filter(Boolean);
}

// ── SAVE / LOAD / CLEAR ───────────────────────────────────────────────────
function gatherAll() {
  return {
    meta:       getMeta(),
    summary:    document.getElementById('summary').value,
    highlights: getHighlights(),
    tasks:      getTasks(),
    blockers:   getList('blockers-list'),
    nextSteps:  getList('next-list')
  };
}
function renderAll(d) {
  loadMeta(d.meta || DEFAULT.meta);
  document.getElementById('summary').value = d.summary || '';

  document.getElementById('highlights-list').innerHTML = '';
  (d.highlights || []).forEach(h => addHighlight(h));

  document.getElementById('tasks-list').innerHTML = '';
  (d.tasks || []).forEach(t => addTask(t.status, t.text, t.start, t.end));

  document.getElementById('blockers-list').innerHTML = '';
  (d.blockers || []).forEach(b => addListItem('blockers-list','⛔',b));

  document.getElementById('next-list').innerHTML = '';
  (d.nextSteps || []).forEach(n => addListItem('next-list','→',n));
}
function saveToLocal() {
  localStorage.setItem('namlatic_report', JSON.stringify(gatherAll()));
  toast('✅ Draft saved to browser!');
}
function loadFromLocal() {
  const raw = localStorage.getItem('namlatic_report');
  if (!raw) { toast('No saved draft found.'); return; }
  renderAll(JSON.parse(raw));
  toast('📂 Draft loaded!');
}
function clearAll() {
  if (!confirm('Clear all fields and start fresh?')) return;
  renderAll({ meta: DEFAULT.meta, summary:'', highlights:[], tasks:[], blockers:[], nextSteps:[] });
  toast('🗑 Cleared!');
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────
function downloadPDF() {
  const d = gatherAll();
  toast('⏳ Generating PDF...');
  setTimeout(() => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const W = 210, M = 14;
    let y = 16;

    pdf.setFillColor(30,42,58);
    pdf.rect(0,0,W,28,'F');
    pdf.setTextColor(255,255,255);
    pdf.setFontSize(16); pdf.setFont('helvetica','bold');
    pdf.text('NAMLATIC — WEEKLY STATUS REPORT',M,12);
    pdf.setFontSize(9); pdf.setFont('helvetica','normal');
    pdf.text(`${d.meta.day} · ${d.meta.date} · ${d.meta.sprint}`,M,20);
    pdf.text(`Prepared by: ${d.meta.by} | Submitted to: ${d.meta.to}`,M,26);
    y = 36;

    const section = (title, color) => {
      pdf.setFillColor(...color);
      pdf.rect(M,y,W-M*2,7,'F');
      pdf.setTextColor(255,255,255);
      pdf.setFontSize(10); pdf.setFont('helvetica','bold');
      pdf.text(title, M+3, y+5);
      y += 10;
      pdf.setTextColor(30,42,58);
    };
    const line = (txt,indent=0) => {
      pdf.setFontSize(9); pdf.setFont('helvetica','normal');
      const lines = pdf.splitTextToSize(`${txt}`, W-M*2-indent-4);
      lines.forEach(l => { if(y>280){pdf.addPage();y=14;} pdf.text(l,M+indent,y); y+=5; });
      y+=1;
    };

    if(d.summary){
      section('EXECUTIVE SUMMARY',[249,115,22]);
      line(d.summary);
      y+=2;
    }
    if(d.highlights.length){
      section('HIGHLIGHTS',[16,185,129]);
      d.highlights.forEach(h=>line('• '+h,2));
      y+=2;
    }
    if(d.tasks.length){
      section('TASK STATUS',[59,130,246]);
      d.tasks.forEach(t=>{
        const badge = {completed:'[DONE]','in-progress':'[IN PROGRESS]',blocked:'[BLOCKED]',planned:'[PLANNED]'};
        pdf.setFont('helvetica','bold'); pdf.setFontSize(9);
        pdf.text(badge[t.status]||'', M+2, y); y+=5;
        pdf.setFont('helvetica','normal');
        const lines = pdf.splitTextToSize(t.text, W-M*2-4);
        lines.forEach(l => { if(y>280){pdf.addPage();y=14;} pdf.text(l,M+2,y); y+=5; });
        if(t.start||t.end) line(`Start: ${t.start||'—'}   End/ETA: ${t.end||'—'}`, 4);
        y+=2;
      });
    }
    if(d.blockers.length){
      section('BLOCKERS',[244,63,94]);
      d.blockers.forEach(b=>line('⚠ '+b,2));
      y+=2;
    }
    if(d.nextSteps.length){
      section('NEXT STEPS',[139,92,246]);
      d.nextSteps.forEach(n=>line('→ '+n,2));
    }

    pdf.setFontSize(8); pdf.setTextColor(150,150,150);
    pdf.text(`Namlatic.com · Auto-generated · ${new Date().toLocaleString()}`, M, 292);

    pdf.save(`Namlatic_Report_${(d.meta.date||'report').replace(/\s+/g,'_')}.pdf`);
    toast('✅ PDF downloaded!');
  }, 200);
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────
function downloadExcel() {
  const d = gatherAll();
  const rows = [];
  rows.push(['NAMLATIC WEEKLY STATUS REPORT']);
  rows.push(['Date', d.meta.date, 'Day', d.meta.day]);
  rows.push(['Sprint', d.meta.sprint, 'Prepared By', d.meta.by]);
  rows.push(['Submitted To', d.meta.to]);
  rows.push([]);
  rows.push(['EXECUTIVE SUMMARY']);
  rows.push([d.summary]);
  rows.push([]);
  rows.push(['HIGHLIGHTS']);
  d.highlights.forEach(h=>rows.push(['•', h]));
  rows.push([]);
  rows.push(['TASK STATUS']);
  rows.push(['Status','Task Description','Start Date','End / ETA']);
  d.tasks.forEach(t=>rows.push([t.status.toUpperCase(), t.text, t.start, t.end]));
  rows.push([]);
  rows.push(['BLOCKERS']);
  d.blockers.forEach(b=>rows.push(['⚠', b]));
  rows.push([]);
  rows.push(['NEXT STEPS']);
  d.nextSteps.forEach(n=>rows.push(['→', n]));

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:18},{wch:60},{wch:14},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Weekly Report');
  XLSX.writeFile(wb, `Namlatic_Report_${(d.meta.date||'report').replace(/\s+/g,'_')}.xlsx`);
  toast('✅ Excel downloaded!');
}

// ── INIT ──────────────────────────────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('namlatic_report');
  if (saved) {
    renderAll(JSON.parse(saved));
    toast('📂 Last draft loaded automatically!');
  } else {
    renderAll(DEFAULT);
  }
};
</script>
</body>
</html>
