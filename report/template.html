<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Executive Briefing - Namlatech</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --text-dark: #334155;
            --bg-light: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
        }
        .report-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-top: 6px solid var(--accent);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .logo-placeholder {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .logo-placeholder span {
            color: var(--accent);
        }
        .meta-info {
            text-align: right;
        }
        .meta-info h1 {
            margin: 0;
            font-size: 22px;
            color: var(--primary);
        }
        .meta-info p {
            margin: 5px 0 0 0;
            color: #64748b;
            font-size: 14px;
        }
        h2 {
            color: var(--primary);
            font-size: 18px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            margin-top: 30px;
        }
        /* Table Layout styling */
        .task-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .task-table th, .task-table td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        .task-table th {
            background-color: #f1f5f9;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        .task-table tbody tr:hover {
            background-color: #f8fafc;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 20px;
            text-align: center;
            text-transform: uppercase;
            width: 80px;
        }
        .badge.completed { background-color: #d1fae5; color: #065f46; }
        .badge.in-progress { background-color: #dbeafe; color: #1e40af; }
        .badge.blocked { background-color: #fee2e2; color: #991b1b; }
                .status-list {
                    list-style: none;
                    padding: 0;
                }
                .status-item {
                    display: flex;
                    align-items: flex-start;
                    padding: 12px 0;
                    border-bottom: 1px solid #f1f5f9;
                }
                .badge {
                    display: inline-block;
                    padding: 4px 12px;
                    font-size: 12px;
                    font-weight: 600;
                    border-radius: 20px;
                    margin-right: 15px;
                    min-width: 90px;
                    text-align: center;
                    text-transform: uppercase;
                }
                .badge.completed { background-color: #d1fae5; color: #065f46; }
                .badge.in-progress { background-color: #dbeafe; color: #1e40af; }
                .badge.blocked { background-color: #fee2e2; color: #991b1b; }
        
        .task-text {
            font-size: 15px;
            line-height: 1.5;
        }
        .highlight-box {
            background-color: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .highlight-box ul {
            margin: 0;
            padding-left: 20px;
        }
        .highlight-box li {
            margin-bottom: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="report-container">
    <div class="header">
        <div class="logo-placeholder">namlatic<span>.com</span></div>
        <div class="meta-info">
            <h1>Weekly Status Report</h1>
            <p>Generated: {{GENERATION_DATE}}</p>
        </div>
    </div>

    <div class="highlight-box">
        <h3 style="margin-top:0; color: var(--primary);">Executive Summary & Key Highlights</h3>
        <ul>
            {{KEY_HIGHLIGHTS}}
        </ul>
    </div>

<h2>Functional Deliverables & Task Status</h2>
<table class="task-table">
    <thead>
        <tr>
            <th style="width: 15%;">Status</th>
            <th style="width: 55%;">Task Description</th>
            <th style="width: 15%;">Start Date</th>
            <th style="width: 15%;">End Date</th>
        </tr>
    </thead>
    <tbody>
        {{TASK_STATUS_ROWS}}
    </tbody>
</table>
    <ul class="status-list">
        {{TASK_STATUS_ROWS}}
    </ul>
</div>

</body>
</html>
